<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Monitor Estação - Mobile Fix</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
  :root {
    --bg: #0d1117; --surface: #161b22; --border: rgba(255,255,255,0.08);
    --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
    --temp-color: #ff7b72; --umid-color: #79c0ff; --card-radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 20px; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(13,17,23,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
  .status-pill { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 10px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; }
  main { padding: 8px; display: flex; flex-direction: column; gap: 8px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); overflow: hidden; }
  .dashboard-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .side-chart { flex: 2; min-width: 300px; }
  .center-metrics { flex: 1; display: flex; flex-direction: column; gap: 1px; background: var(--border); min-width: 120px; }
  .metric { background: var(--surface); padding: 12px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .metric-label { font-size: 8px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .metric-value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; }
  .temp { color: var(--temp-color); } .umid { color: var(--umid-color); }
  .chart-wrap { padding: 10px; height: 260px; }
  .file-zone { padding: 20px; text-align: center; }
  .file-btn { background: #1c2333; padding: 12px 20px; border-radius: 6px; cursor: pointer; color: var(--accent); border: 1px dashed var(--accent); display: inline-block; font-weight: 600; }
  input[type=file] { display: none; }
  @media (max-width: 600px) { .dashboard-row { flex-direction: column; } .center-metrics { flex-direction: row; flex-wrap: wrap; } .metric { min-width: 50%; } }
</style>
</head>
<body>

<header>
  <div style="background:var(--accent); width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center;">🌤</div>
  <h1 style="font-size:14px;">Simuc Monitor</h1>
  <div class="status-pill"><div id="status-dot" class="status-dot" style="background:#8b949e"></div> <span id="timer">OFFLINE</span></div>
</header>

<main>
  <div class="card" id="import-card">
    <div class="file-zone">
      <label class="file-btn" for="csv-input">📂 ABRIR ARQUIVO CSV</label>
      <input type="file" id="csv-input" accept="*">
      <p id="file-info" style="font-size:10px; color:var(--muted); margin-top:10px">Toque acima para selecionar o arquivo da estação</p>
    </div>
  </div>

  <div class="dashboard-row" id="dashboard" style="display:none">
    <div class="card side-chart">
      <div class="chart-wrap"><canvas id="chart-tu"></canvas></div>
    </div>
    <div class="center-metrics">
      <div class="metric"><div class="metric-label">Temperatura</div><div class="metric-value temp" id="v-temp">--</div></div>
      <div class="metric"><div class="metric-label">Umidade</div><div class="metric-value umid" id="v-umid">--</div></div>
      <div class="metric"><div class="metric-label">Orvalho</div><div class="metric-value" style="color:#56d364" id="v-dew">--</div></div>
      <div class="metric"><div class="metric-label">Chuva Total</div><div class="metric-value" style="color:var(--accent)" id="v-precip">--</div></div>
    </div>
    <div class="card side-chart">
      <div class="chart-wrap"><canvas id="chart-precip"></canvas></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let chartTU = null, chartP = null, lastRawData = [];

function parseCSV(text) {
    // 1. Limpeza de BOM e caracteres invisíveis de controle
    const cleanText = text.replace(/^\uFEFF/, '').replace(/\r/g, '');
    const lines = cleanText.split('\n').filter(l => l.trim() !== '');
    if (lines.length < 2) return [];

    // 2. Limpeza profunda do cabeçalho
    const header = lines[0].toLowerCase().split(',').map(h => h.trim().replace(/[^a-z0-9_]/g, ''));
    
    const col = {
        date: header.indexOf('data'),
        time: header.indexOf('hora'),
        temp: header.indexOf('temperatura'),
        umid: header.indexOf('umidade'),
        rain: header.indexOf('chuvamm') // Removemos o underline no regex de limpeza
    };

    // Validação de colunas
    if (col.date === -1 || col.temp === -1) {
        alert("Erro: Colunas não encontradas. Verifique se o arquivo tem: data, hora, temperatura, umidade, chuva_mm");
        return [];
    }

    const rows = [];
    for (let i = 1; i < lines.length; i++) {
        const c = lines[i].split(',').map(v => v.trim());
        if (c.length < header.length) continue;

        try {
            const dateStr = c[col.date].replace(/\//g, '-');
            const timeStr = c[col.time];
            const ts = new Date(`${dateStr}T${timeStr}`).getTime();
            
            if (!isNaN(ts)) {
                rows.push({
                    ts,
                    T: parseFloat(c[col.temp]),
                    RH: parseFloat(c[col.umid]),
                    P: parseFloat(c[col.rain]) || 0
                });
            }
        } catch (e) {}
    }
    return rows;
}

function processHourly(data) {
    const map = new Map();
    data.forEach(d => {
        const date = new Date(d.ts);
        const key = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}-${date.getHours()}`;
        if (!map.has(key)) map.set(key, { label: `${date.getHours()}h`, tS: 0, uS: 0, pS: 0, c: 0, sort: date.getTime() });
        const e = map.get(key);
        e.tS += d.T; e.uS += d.RH; e.pS += d.P; e.c++;
    });
    return Array.from(map.values()).sort((a,b) => a.sort - b.sort).map(h => ({
        label: h.label, tA: h.tS/h.c, uA: h.uS/h.c, pS: h.pS
    }));
}

function render() {
    if (!lastRawData.length) return;
    const latest = lastRawData[lastRawData.length - 1];
    const hourly = processHourly(lastRawData);
    const totalP = lastRawData.reduce((s, d) => s + d.P, 0);

    document.getElementById('v-temp').textContent = latest.T.toFixed(1) + "°C";
    document.getElementById('v-umid').textContent = latest.RH.toFixed(0) + "%";
    document.getElementById('v-precip').textContent = totalP.toFixed(2) + "mm";
    document.getElementById('v-dew').textContent = (latest.T - ((100 - latest.RH)/5)).toFixed(1) + "°C";

    updateCharts(hourly);
    document.getElementById('dashboard').style.display = 'flex';
    document.getElementById('status-dot').style.background = '#3fb950';
    document.getElementById('timer').textContent = 'ONLINE (' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ')';
}

function updateCharts(hourly) {
    const labels = hourly.map(h => h.label);
    const common = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, labels: { color: '#8b949e', font: { size: 10 } } } } };

    if (chartTU) chartTU.destroy();
    chartTU = new Chart(document.getElementById('chart-tu'), {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: 'Temp', data: hourly.map(h => h.tA), borderColor: '#ff7b72', borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: 'y' },
                { label: 'Umid', data: hourly.map(h => h.uA), borderColor: '#79c0ff', borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: 'y1' }
            ]
        },
        options: { ...common, scales: { 
            y: { position: 'left', ticks: { color: '#ff7b72' } },
            y1: { position: 'right', grid: { display: false }, ticks: { color: '#79c0ff' } }
        } }
    });

    if (chartP) chartP.destroy();
    chartP = new Chart(document.getElementById('chart-precip'), {
        type: 'bar',
        data: { labels, datasets: [{ label: 'Chuva mm', data: hourly.map(h => h.pS), backgroundColor: '#58a6ff' }] },
        options: common
    });
}

// Evento de seleção de arquivo otimizado para mobile
document.getElementById('csv-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('file-info').textContent = "Lendo: " + file.name;
    
    const reader = new FileReader();
    reader.onload = function(event) {
        const text = event.target.result;
        const data = parseCSV(text);
        if (data.length > 0) {
            lastRawData = data;
            render();
            document.getElementById('import-card').style.display = 'none';
        }
    };
    reader.onerror = () => alert("Erro ao ler o arquivo no celular.");
    reader.readAsText(file);
});
</script>
</body>
</html>
