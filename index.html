<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Simuc Hourly Monitor</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0d1117; 
    --surface: #161b22; 
    --surface2: #1c2333; 
    --border: rgba(255,255,255,0.08);
    --text: #e6edf3; 
    --muted: #7d8590; 
    --accent: #58a6ff; 
    --temp-color: #ff7b72;
    --umid-color: #79c0ff; 
    --card-radius: 12px;
    --font: 'IBM Plex Sans', sans-serif; 
    --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    font-family: var(--font); 
    background: var(--bg); 
    color: var(--text); 
    padding-bottom: 30px;
    line-height: 1.4;
  }

  header { 
    position: sticky; 
    top: 0; 
    z-index: 100; 
    background: rgba(13,17,23,0.95); 
    backdrop-filter: blur(12px); 
    border-bottom: 1px solid var(--border); 
    padding: 12px 16px; 
    display: flex; 
    align-items: center; 
    gap: 10px;
  }

  .status-pill { 
    margin-left: auto; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    font-size: 12px; 
    color: var(--muted); 
  }

  .status-dot { 
    width: 8px; 
    height: 8px; 
    border-radius: 50%; 
    background: #3fb950; 
  }
  .status-dot.wait { background: #d29922; }

  main { 
    padding: 12px; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
  }

  .card { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: var(--card-radius); 
    overflow: hidden; 
  }

  .dashboard-row { 
    display: flex; 
    gap: 10px; 
    flex-direction: column; 
  }

  .side-chart { 
    flex: 1; 
    min-height: 280px;
  }

  .center-metrics { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 1px; 
    background: var(--border); 
    border-radius: var(--card-radius); 
    overflow: hidden;
    border: 1px solid var(--border); 
  }

  .card-header { 
    padding: 10px 14px; 
    border-bottom: 1px solid var(--border); 
    font-size: 11px; 
    font-weight: 600; 
    color: var(--muted); 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
  }

  .metric { 
    background: var(--surface); 
    padding: 14px 12px; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
  }

  .metric-label { 
    font-size: 10px; 
    color: var(--muted); 
    margin-bottom: 4px; 
    font-weight: 600; 
  }

  .metric-value { 
    font-family: var(--mono); 
    font-size: 22px; 
    font-weight: 600; 
  }

  .metric-unit { 
    font-size: 12px; 
    color: var(--muted); 
    margin-left: 4px; 
  }

  .temp { color: var(--temp-color); }
  .umid { color: var(--umid-color); }
  .precip { color: var(--accent); }

  .chart-wrap { 
    padding: 12px; 
    height: 260px; 
    position: relative; 
  }

  .file-zone { 
    padding: 16px; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
  }

  .file-btn { 
    background: var(--surface2); 
    padding: 14px 20px; 
    border-radius: 8px; 
    cursor: pointer; 
    font-size: 15px; 
    color: var(--accent); 
    border: 1.5px dashed var(--accent); 
    font-weight: 600; 
    text-align: center;
  }

  input[type=file] { display: none; }

  .update-row { 
    text-align: center; 
    font-size: 12px; 
    color: var(--muted); 
    margin-top: 10px; 
    font-family: var(--mono); 
  }

  .timer-tag { 
    background: rgba(88,166,255,0.12); 
    color: var(--accent); 
    padding: 4px 10px; 
    border-radius: 6px; 
    font-weight: 600; 
  }

  /* ==================== MELHORIAS PARA MOBILE ==================== */
  @media (max-width: 768px) {
    body { font-size: 15px; }
    .metric-value { font-size: 24px; }
    .chart-wrap { height: 240px; }
    header { padding: 12px 14px; }
    main { padding: 10px; gap: 10px; }
    .file-zone { padding: 14px; }
    .file-btn { padding: 16px; font-size: 16px; }
  }

  @media (max-width: 480px) {
    .chart-wrap { height: 220px; }
    .metric { padding: 12px 10px; }
    .metric-value { font-size: 21px; }
    .card-header { font-size: 10px; padding: 9px 12px; }
  }
</style>
</head>
<body>

<header>
  <div style="background:var(--accent); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px;">🌤</div>
  <h1 style="font-size:15px; margin-left:6px">Simuc Hourly Monitor</h1>
  <div class="status-pill">
    <span id="timer-display" class="timer-tag">--s</span>
    <div id="status-dot" class="status-dot wait"></div>
    <span id="status-text">OFFLINE</span>
  </div>
</header>

<main>
  <div class="card">
    <div class="file-zone">
      <label class="file-btn" for="csv-input">📂 Selecionar Arquivo CSV</label>
      <input type="file" id="csv-input" accept="*" multiple>
      <div id="station-name" style="font-size:13px; color:var(--muted); text-align:center;">
        Aguardando arquivo...
      </div>
    </div>
  </div>

  <div class="dashboard-row" id="dashboard-main" style="display:none">
    <div class="card side-chart">
      <div class="card-header">Médias Horárias</div>
      <div class="chart-wrap"><canvas id="chart-tu"></canvas></div>
    </div>

    <div class="center-metrics">
      <div class="metric"><div class="metric-label">TEMPERATURA</div><div class="metric-value temp"><span id="v-temp">—</span><small class="metric-unit">°C</small></div></div>
      <div class="metric"><div class="metric-label">UMIDADE</div><div class="metric-value umid"><span id="v-umid">—</span><small class="metric-unit">%</small></div></div>
      <div class="metric"><div class="metric-label">PONTO DE ORVALHO</div><div class="metric-value" style="color:#56d364"><span id="v-dew">—</span><small class="metric-unit">°C</small></div></div>
      <div class="metric"><div class="metric-label">CHUVA TOTAL</div><div class="metric-value precip"><span id="v-precip">—</span><small class="metric-unit">mm</small></div></div>
    </div>

    <div class="card side-chart">
      <div class="card-header">Chuva por Hora</div>
      <div class="chart-wrap"><canvas id="chart-precip"></canvas></div>
    </div>
  </div>

  <div class="update-row" id="update-row" style="display:none">
    Atualização a cada 30s • Última: <span id="last-data-ts">—</span>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  // (Seu JavaScript continua o mesmo - só melhorei a parte visual)
  let chartTU = null, chartP = null, lastRawData = [], secondsLeft = 30, timerInterval = null;

  // ... (o resto do seu script permanece igual)

  document.getElementById('csv-input').addEventListener('change', e => {
    const files = e.target.files;
    if (!files.length) return;

    const promises = Array.from(files).map(f => f.text());
    Promise.all(promises).then(texts => {
      let allData = [];
      texts.forEach(t => allData = allData.concat(parseCSV(t)));
      allData.sort((a,b) => a.ts - b.ts);

      if(allData.length > 0) {
        lastRawData = allData;
        render();
        document.getElementById('station-name').textContent = files[0].name;

        if(!timerInterval) {
          timerInterval = setInterval(() => {
            secondsLeft--;
            document.getElementById('timer-display').textContent = secondsLeft + 's';
            if(secondsLeft <= 0){
              secondsLeft = 30;
              render();
            }
          }, 1000);
        }
      } else {
        alert("Erro: Formato do CSV não reconhecido.");
      }
    });
  });
</script>
</body>
</html>
