<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Simuc Hourly Monitor</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333; --border: rgba(255,255,255,0.08);
    --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff; --temp-color: #ff7b72;
    --umid-color: #79c0ff; --card-radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { 
    font-family: 'IBM Plex Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    padding-bottom: 30px;
  }

  header { 
    position: sticky; top: 0; z-index: 100; 
    background: rgba(13,17,23,0.95); backdrop-filter: blur(12px); 
    border-bottom: 1px solid var(--border); 
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  }

  main { padding: 12px; display: flex; flex-direction: column; gap: 12px; }

  .card { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: var(--card-radius); 
    overflow: hidden; 
  }

  .file-zone { 
    padding: 16px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    gap: 12px; 
    flex-wrap: wrap;
  }

  .file-btn { 
    background: var(--surface2); 
    padding: 14px 18px; 
    border-radius: 8px; 
    cursor: pointer; 
    font-size: 15px; 
    color: var(--accent); 
    border: 1.5px dashed var(--accent); 
    font-weight: 600; 
    touch-action: manipulation;
  }

  .file-btn:active { background: #21262d; }

  input[type=file] { display: none; }

  /* CORREÇÃO: Altura definida para os gráficos aparecerem */
  .chart-wrap { position: relative; height: 250px; width: 100%; padding: 10px; }

  @media (max-width: 600px) {
    .file-zone { padding: 14px; }
    .file-btn { padding: 16px 20px; font-size: 16px; }
    .metric-value { font-size: 23px; }
    .chart-wrap { height: 235px; }
  }

  .dashboard-row { display: flex; gap: 10px; flex-direction: column; }
  .center-metrics { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 1px; 
    background: var(--border); 
    border-radius: var(--card-radius); 
    overflow: hidden;
  }
  .metric { background: var(--surface); padding: 14px 12px; }
  .metric-label { font-size: 10px; color: var(--muted); font-weight: 600; }
  .metric-value { font-family: 'IBM Plex Mono', monospace; font-size: 23px; font-weight: 600; }
  .card-header { padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .update-row { text-align: center; font-size: 12px; color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div style="background:var(--accent); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px;">🌤</div>
  <h1 style="font-size:15px;">Simuc Hourly Monitor</h1>
  <div style="margin-left:auto; font-size:12px; color:var(--muted);">
    <span id="status-text">OFFLINE</span>
  </div>
</header>

<main>
  <div class="card">
    <div class="file-zone">
      <label class="file-btn" for="csv-input">📂 Selecionar Arquivos</label>
      <input type="file" id="csv-input" accept="*" multiple>
      <div id="station-name" style="font-size:13px; color:var(--muted); flex:1; text-align:right;">
        Aguardando arquivo...
      </div>
    </div>
  </div>

  <div class="dashboard-row" id="dashboard-main" style="display:none">
    <div class="card">
      <div class="card-header">Médias Horárias</div>
      <div class="chart-wrap"><canvas id="chart-tu"></canvas></div>
    </div>

    <div class="card center-metrics">
      <div class="metric"><div class="metric-label">TEMPERATURA</div><div class="metric-value temp"><span id="v-temp">—</span><small class="metric-unit">°C</small></div></div>
      <div class="metric"><div class="metric-label">UMIDADE</div><div class="metric-value umid"><span id="v-umid">—</span><small class="metric-unit">%</small></div></div>
      <div class="metric"><div class="metric-label">PONTO DE ORVALHO</div><div class="metric-value" style="color:#56d364"><span id="v-dew">—</span><small class="metric-unit">°C</small></div></div>
      <div class="metric"><div class="metric-label">CHUVA TOTAL</div><div class="metric-value precip"><span id="v-precip">—</span><small class="metric-unit">mm</small></div></div>
    </div>

    <div class="card">
      <div class="card-header">Chuva por Hora</div>
      <div class="chart-wrap"><canvas id="chart-precip"></canvas></div>
    </div>
  </div>

  <div class="update-row" id="update-row" style="display:none">
    Dados carregados com sucesso
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let chartTU = null, chartP = null, lastRawData = [];

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  
  const header = lines[0].toLowerCase().split(',').map(h => h.trim());
  const col = {
    date: header.indexOf('data'),
    time: header.indexOf('hora'),
    temp: header.indexOf('temperatura'),
    umid: header.indexOf('umidade'),
    rain: header.indexOf('chuva_mm')
  };

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const c = lines[i].split(',').map(v => v.trim());
    if (c.length < 4) continue;
    try {
      // Ajuste para aceitar datas DD/MM/YYYY ou YYYY-MM-DD
      let datePart = c[col.date];
      if(datePart.includes('/')) {
         const parts = datePart.split('/');
         if(parts[0].length === 4) datePart = `${parts[0]}-${parts[1]}-${parts[2]}`;
         else datePart = `${parts[2]}-${parts[1]}-${parts[0]}`;
      }
      
      const ts = new Date(`${datePart}T${c[col.time]}`).getTime();
      if (isNaN(ts)) continue;
      
      rows.push({
        ts,
        T: parseFloat(c[col.temp]),
        RH: parseFloat(c[col.umid]),
        P: parseFloat(c[col.rain]) || 0
      });
    } catch (e) {}
  }
  return rows;
}

function processHourlyData(rawData) {
  const hourlyMap = new Map();
  rawData.forEach(d => {
    const date = new Date(d.ts);
    // Chave única por hora e dia
    const key = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}-${date.getHours()}`;
    if (!hourlyMap.has(key)) {
      hourlyMap.set(key, { label: `${date.getHours()}h`, tSum: 0, uSum: 0, pSum: 0, count: 0, sortKey: date.getTime() });
    }
    const entry = hourlyMap.get(key);
    entry.tSum += d.T; entry.uSum += d.RH; entry.pSum += d.P; entry.count++;
  });
  return Array.from(hourlyMap.values()).sort((a, b) => a.sortKey - b.sortKey)
    .map(h => ({
      label: h.label, 
      tempAvg: h.tSum / h.count, 
      umidAvg: h.uSum / h.count, 
      precipSum: h.pSum
    }));
}

function render() {
  if (!lastRawData.length) return;
  
  const latest = lastRawData[lastRawData.length - 1];
  const hourlyData = processHourlyData(lastRawData);
  const totalRain = lastRawData.reduce((s, d) => s + d.P, 0);

  document.getElementById('v-temp').textContent = latest.T.toFixed(1);
  document.getElementById('v-umid').textContent = latest.RH.toFixed(0);
  document.getElementById('v-precip').textContent = totalRain.toFixed(2);
  
  // Fórmula simples de ponto de orvalho
  const dew = latest.T - ((100 - latest.RH) / 5);
  document.getElementById('v-dew').textContent = dew.toFixed(1);

  updateCharts(hourlyData);
  
  document.getElementById('dashboard-main').style.display = 'flex';
  document.getElementById('update-row').style.display = 'block';
  document.getElementById('status-text').textContent = 'ONLINE';
}

function updateCharts(hourly) {
  const labels = hourly.map(h => h.label);
  const legendStyle = { display: true, position: 'top', labels: { color: '#7d8590', font: { size: 10 }} };

  if (chartTU) chartTU.destroy();
  
  chartTU = new Chart(document.getElementById('chart-tu'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Temperatura (°C)', data: hourly.map(h => h.tempAvg), borderColor: '#ff7b72', backgroundColor: '#ff7b72', tension: 0.3, yAxisID: 'y' },
        { label: 'Umidade (%)', data: hourly.map(h => h.umidAvg), borderColor: '#79c0ff', backgroundColor: '#79c0ff', tension: 0.3, yAxisID: 'y2' }
      ]
    },
    options: { 
      responsive: true, 
      maintainAspectRatio: false, 
      plugins: { legend: legendStyle },
      scales: {
        y: { 
          position: 'left',
          title: { display: true, text: 'Temp (°C)', color: '#ff7b72' },
          ticks: { color: '#ff7b72' },
          grid: { color: 'rgba(255,255,255,0.05)' }
        },
        y2: { 
          position: 'right',
          title: { display: true, text: 'Umid (%)', color: '#79c0ff' },
          ticks: { color: '#79c0ff' },
          grid: { drawOnChartArea: false }
        }
      }
    }
  });

  if (chartP) chartP.destroy();
  chartP = new Chart(document.getElementById('chart-precip'), {
    type: 'bar',
    data: { 
      labels, 
      datasets: [{ label: 'Chuva (mm)', data: hourly.map(h => h.precipSum), backgroundColor: '#58a6ff' }] 
    },
    options: { 
      responsive: true, 
      maintainAspectRatio: false, 
      plugins: { legend: legendStyle }, 
      scales: { 
        y: { 
          beginAtZero: true,
          title: { display: true, text: 'Precipitação (mm)', color: '#58a6ff' },
          ticks: { color: '#58a6ff' },
          grid: { color: 'rgba(255,255,255,0.05)' }
        }
      }
    }
  });
}

document.getElementById('csv-input').addEventListener('change', e => {
  const files = e.target.files;
  if (!files.length) return;

  const promises = Array.from(files).map(f => f.text());
  Promise.all(promises).then(texts => {
    let allData = [];
    texts.forEach(t => allData = allData.concat(parseCSV(t)));
    allData.sort((a,b) => a.ts - b.ts);

    if(allData.length > 0) {
      lastRawData = allData;
      document.getElementById('station-name').textContent = files[0].name;
      render();
    } else {
      alert("Erro: Não foi possível ler dados válidos. Verifique os nomes das colunas (data, hora, temperatura, umidade, chuva_mm).");
    }
  }).catch(() => {
    alert("Erro ao ler o arquivo.");
  });
});
</script>
</body>
</html>
